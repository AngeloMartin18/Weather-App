<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <h1 class="header">Weather App</h1>
    <p>Enter a city to get the forecast</p>
    <form class="form">
      <input type="text" class="cityInput" placeholder="Enter city" />
      <button class="button">Get Weather</button>
    </form>

    <div class="weather-card" style="display: none">
      <h1 class="card-header">Example</h1>
      <h1 class="temp">60.3F</h1>
      <p class="humidity">Humidity: 81%</p>
      <h2 class="forecast">overcast clouds</h2>
      <p class="weather-emoji">☀️</p>
    </div>
  </body>
</html>
